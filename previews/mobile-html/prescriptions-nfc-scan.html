<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedAlpha - NFC Scan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-tab="prescriptions">
    <div class="page-shell">
      <div class="device dark">
        <div class="status-bar">
          <div>9:41</div>
          <div class="status-icons">
            <ion-icon name="cellular"></ion-icon>
            <ion-icon name="wifi"></ion-icon>
            <ion-icon name="battery-full"></ion-icon>
          </div>
        </div>
        <main class="app-content centered" style="position: relative;">
          <div class="stack-lg" style="align-items: center;">
            <div style="width: 160px; height: 160px; border-radius: 50%; background: rgba(242,140,92,0.2); display: flex; align-items: center; justify-content: center;">
              <ion-icon name="wifi" style="font-size: 56px; color: var(--brand-500);"></ion-icon>
            </div>
            <div class="stack-xs" style="text-align: center;">
              <div class="text-title" style="color: #FFFFFF;">Scanning...</div>
              <div class="text-body" style="color: rgba(255,255,255,0.7);">Keep the card still</div>
            </div>
            <div class="row" style="gap: 6px;">
              <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--brand-500); opacity: 0.5;"></span>
              <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--brand-500); opacity: 0.7;"></span>
              <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--brand-500); opacity: 0.9;"></span>
            </div>
          </div>

          <div style="position: absolute; bottom: 40px; left: 24px; right: 24px;">
            <button class="button outline full" style="color: #FFFFFF; border-color: rgba(255,255,255,0.2);">Cancel</button>
          </div>
        </main>
      </div>
    </div>

    <script src="app.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
