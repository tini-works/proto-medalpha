<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedAlpha - NFC Intro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-tab="prescriptions">
    <div class="page-shell">
      <div class="device">
        <div class="status-bar">
          <div>9:41</div>
          <div class="status-icons">
            <ion-icon name="cellular"></ion-icon>
            <ion-icon name="wifi"></ion-icon>
            <ion-icon name="battery-full"></ion-icon>
          </div>
        </div>
        <main class="app-content">
          <div class="stack-lg" style="align-items: center;">
            <div style="width: 160px; height: 160px; border-radius: 24px; background: var(--brand-50); display: flex; align-items: center; justify-content: center;">
              <div class="stack-sm" style="align-items: center;">
                <ion-icon name="wifi" style="font-size: 48px; color: var(--brand-500);"></ion-icon>
                <div style="width: 60px; height: 40px; border-radius: 8px; background: var(--brand-100); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--brand-500);">eGK</div>
              </div>
            </div>
            <div class="stack-xs" style="text-align: center;">
              <div class="text-title">Scan your health card</div>
              <div class="text-body">To redeem your e-prescription, we will read your eGK card using NFC.</div>
            </div>
          </div>

          <div class="card">
            <div class="stack-sm">
              <div style="font-weight: 600;">What you need:</div>
              <div class="row">
                <ion-icon name="checkmark-circle" class="text-success"></ion-icon>
                <span class="text-body">Your eGK health card</span>
              </div>
              <div class="row">
                <ion-icon name="checkmark-circle" class="text-success"></ion-icon>
                <span class="text-body">NFC enabled on your phone</span>
              </div>
            </div>
          </div>

          <button class="button primary full">Continue</button>
        </main>

        <nav class="tab-bar">
          <a class="tab-item" data-tab-item="home" href="home.html">
            <ion-icon name="home-outline"></ion-icon>
            <span>Home</span>
          </a>
          <a class="tab-item" data-tab-item="appointments" href="appointments.html">
            <ion-icon name="calendar-outline"></ion-icon>
            <span>Appointments</span>
          </a>
          <a class="tab-item" data-tab-item="prescriptions" href="prescriptions.html">
            <ion-icon name="medical"></ion-icon>
            <span>Prescriptions</span>
          </a>
          <a class="tab-item" data-tab-item="history" href="history.html">
            <ion-icon name="time-outline"></ion-icon>
            <span>History</span>
          </a>
        </nav>
      </div>
    </div>

    <script src="app.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
