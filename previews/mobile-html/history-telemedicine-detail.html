<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedAlpha - Telemedicine Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-tab="history">
    <div class="page-shell">
      <div class="device">
        <div class="status-bar">
          <div>9:41</div>
          <div class="status-icons">
            <ion-icon name="cellular"></ion-icon>
            <ion-icon name="wifi"></ion-icon>
            <ion-icon name="battery-full"></ion-icon>
          </div>
        </div>
        <div class="app-header">
          <div class="row" style="gap: 6px;">
            <ion-icon name="chevron-back"></ion-icon>
            <span class="title">Dr. Weber</span>
          </div>
          <div class="badge sky">Video call</div>
        </div>
        <main class="app-content">
          <div class="row">
            <div class="icon-pill sky" style="width: 64px; height: 64px; border-radius: 18px;">
              <ion-icon name="videocam"></ion-icon>
            </div>
            <div>
              <div class="text-headline">Dr. Weber</div>
              <div class="text-body">General Medicine</div>
            </div>
          </div>

          <div class="card">
            <div class="stack-sm">
              <div class="row">
                <div class="icon-pill"><ion-icon name="calendar-outline"></ion-icon></div>
                <div>
                  <div class="text-caption">Date</div>
                  <div style="font-weight: 600;">10 Jan 2026</div>
                </div>
              </div>
              <div class="row">
                <div class="icon-pill"><ion-icon name="time-outline"></ion-icon></div>
                <div>
                  <div class="text-caption">Duration</div>
                  <div style="font-weight: 600;">15 minutes</div>
                </div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Session summary</div>
            <div class="card">
              <div class="text-body">
                Patient presented with mild cold symptoms. Recommended rest and fluids. Prescribed Ibuprofen for pain relief if needed.
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Related</div>
            <a class="card" href="history-prescription-detail.html" target="_blank">
              <div class="list-row">
                <div class="icon-pill sage"><ion-icon name="medical"></ion-icon></div>
                <div class="meta">
                  <div style="font-weight: 600;">Ibuprofen 400mg</div>
                  <div class="text-caption text-success">Redeemed at pharmacy</div>
                </div>
                <ion-icon name="chevron-forward" class="chevron"></ion-icon>
              </div>
            </a>
          </div>

          <button class="button primary full">
            Book another session <ion-icon name="videocam"></ion-icon>
          </button>
          <div class="fab-space"></div>
        </main>
      </div>
    </div>

    <script src="app.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
