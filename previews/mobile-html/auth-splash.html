<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedAlpha - Splash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="device brand">
        <div class="status-bar">
          <div>9:41</div>
          <div class="status-icons">
            <ion-icon name="cellular"></ion-icon>
            <ion-icon name="wifi"></ion-icon>
            <ion-icon name="battery-full"></ion-icon>
          </div>
        </div>
        <main class="app-content centered">
          <div class="stack-lg" style="align-items: center;">
            <div class="card dark" style="width: 120px; height: 120px; border-radius: 32px; display: flex; align-items: center; justify-content: center;">
              <ion-icon name="heart-circle" style="font-size: 72px; color: #FFFFFF;"></ion-icon>
            </div>
            <div class="stack-xs" style="align-items: center;">
              <div style="font-size: 30px; font-weight: 700;">MedAlpha</div>
              <div style="color: rgba(255,255,255,0.8);">Your health companion</div>
            </div>
          </div>
          <div style="position: absolute; bottom: 70px; width: 32px; height: 4px; border-radius: 999px; background: rgba(255,255,255,0.3);">
            <div style="width: 50%; height: 100%; border-radius: 999px; background: #FFFFFF;"></div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
