<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedAlpha - Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="device">
        <div class="status-bar">
          <div>9:41</div>
          <div class="status-icons">
            <ion-icon name="cellular"></ion-icon>
            <ion-icon name="wifi"></ion-icon>
            <ion-icon name="battery-full"></ion-icon>
          </div>
        </div>
        <div class="app-header">
          <div class="title">Settings</div>
          <div></div>
        </div>
        <main class="app-content">
          <div class="section">
            <div class="section-title">Preferences</div>
            <div class="stack-sm">
              <a class="card" href="settings-language.html" target="_blank">
                <div class="list-row">
                  <div class="icon-pill sky"><ion-icon name="globe-outline"></ion-icon></div>
                  <div class="meta">
                    <div style="font-weight: 600;">Language & Region</div>
                    <div class="text-caption">Deutsch (DE)</div>
                  </div>
                  <ion-icon name="chevron-forward" class="chevron"></ion-icon>
                </div>
              </a>
              <a class="card" href="settings-notifications.html" target="_blank">
                <div class="list-row">
                  <div class="icon-pill brand"><ion-icon name="notifications"></ion-icon></div>
                  <div class="meta">
                    <div style="font-weight: 600;">Notifications</div>
                    <div class="text-caption">Manage push notifications</div>
                  </div>
                  <ion-icon name="chevron-forward" class="chevron"></ion-icon>
                </div>
              </a>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Account</div>
            <div class="stack-sm">
              <a class="card" href="settings-change-password.html" target="_blank">
                <div class="list-row">
                  <div class="icon-pill"><ion-icon name="lock-closed"></ion-icon></div>
                  <div class="meta">
                    <div style="font-weight: 600;">Change Password</div>
                  </div>
                  <ion-icon name="chevron-forward" class="chevron"></ion-icon>
                </div>
              </a>
              <div class="card">
                <div class="list-row">
                  <div class="icon-pill"><ion-icon name="log-out-outline"></ion-icon></div>
                  <div class="meta">
                    <div style="font-weight: 600;">Log out</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Danger Zone</div>
            <div class="card">
              <div class="list-row">
                <div class="icon-pill" style="background: rgba(226,106,94,0.15); color: var(--error);">
                  <ion-icon name="trash"></ion-icon>
                </div>
                <div class="meta">
                  <div style="font-weight: 600; color: var(--error);">Delete Account</div>
                  <div class="text-caption">Permanently remove your data</div>
                </div>
              </div>
            </div>
          </div>

          <div class="stack-xs" style="align-items: center;">
            <div class="text-caption">MedAlpha Version 1.0.0</div>
            <div class="text-caption">Build 2026.01.15</div>
          </div>
        </main>
      </div>
    </div>

    <script src="app.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
