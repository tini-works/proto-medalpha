<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedAlpha - Order Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-tab="prescriptions">
    <div class="page-shell">
      <div class="device">
        <div class="status-bar">
          <div>9:41</div>
          <div class="status-icons">
            <ion-icon name="cellular"></ion-icon>
            <ion-icon name="wifi"></ion-icon>
            <ion-icon name="battery-full"></ion-icon>
          </div>
        </div>
        <main class="app-content">
          <div class="stack-lg" style="align-items: center; text-align: center;">
            <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center;">
              <ion-icon name="checkmark" style="font-size: 40px; color: #FFFFFF;"></ion-icon>
            </div>
            <div class="text-title">Order placed!</div>
          </div>

          <div class="card">
            <div class="stack-sm">
              <div class="row">
                <div class="icon-pill sage"><ion-icon name="medical"></ion-icon></div>
                <div style="flex: 1; font-weight: 600;">Metformin 500mg</div>
              </div>

              <div class="progress"><span style="width: 33%;"></span></div>

              <div class="row space-between">
                <div class="stack-xs" style="align-items: center;">
                  <div class="icon-pill brand" style="width: 24px; height: 24px; border-radius: 12px;">
                    <ion-icon name="checkmark" style="font-size: 12px;"></ion-icon>
                  </div>
                  <div class="text-caption">Order placed</div>
                </div>
                <div class="stack-xs" style="align-items: center;">
                  <div class="icon-pill" style="width: 24px; height: 24px; border-radius: 12px; background: var(--neutral-200);"></div>
                  <div class="text-caption">Shipped</div>
                </div>
                <div class="stack-xs" style="align-items: center;">
                  <div class="icon-pill" style="width: 24px; height: 24px; border-radius: 12px; background: var(--neutral-200);"></div>
                  <div class="text-caption">Delivered</div>
                </div>
              </div>

              <div class="small-divider"></div>
              <div>
                <div class="text-caption">Estimated delivery</div>
                <div class="text-brand" style="font-weight: 600;">Tomorrow</div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="text-caption">Delivery address</div>
            <div style="font-weight: 600;">Anna Schmidt</div>
            <div class="text-body">Musterstrasse 123</div>
            <div class="text-body">10115 Berlin</div>
          </div>

          <div class="stack-sm" style="margin-top: auto;">
            <button class="button primary full">Back to Home</button>
            <button class="button ghost full">Need help? Contact support</button>
          </div>
        </main>
      </div>
    </div>

    <script src="app.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
