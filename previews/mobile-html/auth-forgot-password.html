<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedAlpha - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="device">
        <div class="status-bar">
          <div>9:41</div>
          <div class="status-icons">
            <ion-icon name="cellular"></ion-icon>
            <ion-icon name="wifi"></ion-icon>
            <ion-icon name="battery-full"></ion-icon>
          </div>
        </div>
        <div class="app-header">
          <div class="row" style="gap: 6px;">
            <ion-icon name="chevron-back"></ion-icon>
            <span class="title">Reset Password</span>
          </div>
          <div></div>
        </div>
        <main class="app-content">
          <div class="stack-lg" style="align-items: center;">
            <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--brand-50); display: flex; align-items: center; justify-content: center;">
              <ion-icon name="mail" style="font-size: 36px; color: var(--brand-500);"></ion-icon>
            </div>
            <div class="stack-xs" style="text-align: center;">
              <div class="text-headline">Forgot your password?</div>
              <div class="text-body">Enter your email address and we will send you a reset link.</div>
            </div>
          </div>

          <div class="stack-sm">
            <label class="text-caption" style="font-weight: 600; color: var(--neutral-900);">Email</label>
            <div class="input">
              <ion-icon name="mail-outline" class="text-light"></ion-icon>
              <input placeholder="Enter your email" />
            </div>
          </div>

          <button class="button primary full">
            Send Reset Link <ion-icon name="send"></ion-icon>
          </button>

          <div class="card sky" style="background: var(--sky-100);">
            <div class="row start">
              <div class="icon-pill sky"><ion-icon name="information-circle"></ion-icon></div>
              <div class="text-body">
                If the email does not arrive, check your spam folder or try another address.
              </div>
            </div>
          </div>

          <div class="card" style="border: 1px dashed var(--neutral-200);">
            <div class="row" style="justify-content: space-between;">
              <div class="row">
                <div class="icon-pill success"><ion-icon name="checkmark-circle"></ion-icon></div>
                <div>
                  <div class="text-headline">Check your email</div>
                  <div class="text-caption">A reset link was sent to anna.schmidt@email.de</div>
                </div>
              </div>
              <button class="button ghost">Resend</button>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="app.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
