<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedAlpha - Change Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="device">
        <div class="status-bar">
          <div>9:41</div>
          <div class="status-icons">
            <ion-icon name="cellular"></ion-icon>
            <ion-icon name="wifi"></ion-icon>
            <ion-icon name="battery-full"></ion-icon>
          </div>
        </div>
        <div class="app-header">
          <div class="title">Change Password</div>
          <div></div>
        </div>
        <main class="app-content">
          <div class="notice sky">
            <ion-icon name="information-circle" class="text-brand"></ion-icon>
            <div class="text-body">
              Your password must be at least 8 characters long and include a mix of letters, numbers, and symbols.
            </div>
          </div>

          <div class="stack-sm">
            <div class="stack-xs">
              <label class="text-caption" style="font-weight: 600;">Current Password</label>
              <div class="input">
                <ion-icon name="lock-closed-outline" class="text-light"></ion-icon>
                <input placeholder="Enter current password" type="password" />
                <ion-icon name="eye" class="text-light"></ion-icon>
              </div>
            </div>
            <div class="stack-xs">
              <label class="text-caption" style="font-weight: 600;">New Password</label>
              <div class="input">
                <ion-icon name="lock-closed-outline" class="text-light"></ion-icon>
                <input placeholder="Enter new password" type="password" />
                <ion-icon name="eye" class="text-light"></ion-icon>
              </div>
            </div>
            <div class="stack-xs">
              <label class="text-caption" style="font-weight: 600;">Confirm New Password</label>
              <div class="input">
                <ion-icon name="lock-closed-outline" class="text-light"></ion-icon>
                <input placeholder="Confirm new password" type="password" />
              </div>
            </div>
          </div>

          <div class="stack-sm">
            <div style="font-weight: 600;">Password requirements:</div>
            <div class="stack-xs">
              <div class="row"><ion-icon name="checkmark-circle" class="text-success"></ion-icon><span class="text-body">At least 8 characters</span></div>
              <div class="row"><ion-icon name="ellipse-outline" class="text-light"></ion-icon><span class="text-body">One uppercase letter</span></div>
              <div class="row"><ion-icon name="ellipse-outline" class="text-light"></ion-icon><span class="text-body">One lowercase letter</span></div>
              <div class="row"><ion-icon name="ellipse-outline" class="text-light"></ion-icon><span class="text-body">One number</span></div>
              <div class="row"><ion-icon name="ellipse-outline" class="text-light"></ion-icon><span class="text-body">One special character</span></div>
            </div>
          </div>

          <button class="button primary full">
            Update Password <ion-icon name="lock-closed"></ion-icon>
          </button>
        </main>
      </div>
    </div>

    <script src="app.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
